name: 'Release to GitHub'

on:
  workflow_dispatch:
    inputs:
      increment:
        description: 'Release version or SemVer increment, for example 0.2.0, patch, minor, or major.'
        type: string
        required: true
      dry-run:
        description: 'Dry-run mode. Does not push commits, tags, or GitHub Release.'
        type: boolean
        required: false
        default: true

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get tags
        run: git fetch --tags origin

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Verify
        run: npm run verify

      - name: Prepare release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            npm run release -- "${{ inputs.increment }}" --ci --dry-run
          else
            npm run release -- "${{ inputs.increment }}" --ci
          fi

      - name: Package release artifacts
        run: |
          ./scripts/package-sdk.sh ./dist
          ./scripts/package-customer-delivery.sh ./dist/customer-delivery

      - name: Create GitHub Release
        if: ${{ inputs.dry-run == false }}
        id: publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./sdk/agora-rtc/package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "refs/tags/${VERSION}"
          gh release create "${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "Release ${VERSION}" \
            --notes-file CHANGELOG.md

      - name: Upload SDK plugin zip
        if: ${{ inputs.dry-run == false }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/agora-rtc-cocos-plugin.zip
          asset_name: agora-rtc-cocos-plugin.zip
          tag: ${{ steps.publish.outputs.version }}
          overwrite: true

      - name: Upload customer delivery plugin zip
        if: ${{ inputs.dry-run == false }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/customer-delivery/agora-rtc-cocos-plugin.zip
          asset_name: agora-rtc-cocos-plugin-customer-delivery.zip
          tag: ${{ steps.publish.outputs.version }}
          overwrite: true

      - name: Upload dry-run artifacts
        if: ${{ inputs.dry-run == true }}
        uses: actions/upload-artifact@v4
        with:
          name: agora-cocos-release-dry-run
          path: dist
          if-no-files-found: error
