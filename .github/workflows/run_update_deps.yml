name: 'run: update dependencies'

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Target branch. Defaults to the branch that triggered this workflow.'
        type: string
        required: false
        default: ''
      dependencies_content:
        description: |
          Native dependency block. Include the iOS Swift Package source/tag and the
          Android Maven coordinate(s), for example:
            github:git@github.com:AgoraIO/AgoraAudio_iOS.git | tag:4.5.3-a1
            implementation 'io.agora.rtc:agora-special-voice:4.5.3.1.BASIC1'
        type: string
        required: true

jobs:
  update_deps:
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Validate inputs
        env:
          DEPENDENCIES_CONTENT: ${{ inputs.dependencies_content }}
        run: |
          if [ -z "$DEPENDENCIES_CONTENT" ]; then
            echo "dependencies_content is required." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch || github.ref_name }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update native dependency config
        env:
          DEPENDENCIES_CONTENT: ${{ inputs.dependencies_content }}
        run: |
          node ./scripts/update-native-deps.mjs \
            --dependencies-content "$DEPENDENCIES_CONTENT"

      - name: Sync derived SDK version files
        run: npm run sync:version

      - name: Verify
        run: npm run verify

      - name: Commit and create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update native dependencies'
          branch: deps/native-sdk-update
          base: ${{ inputs.target_branch || github.ref_name }}
          delete-branch: true
          title: 'chore: update native dependencies'
          body: |
            Updates Agora native dependency versions in `sdk/agora-rtc/sdk-config.json`.

            Dependencies content:

            ```
            ${{ inputs.dependencies_content }}
            ```
