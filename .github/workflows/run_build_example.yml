name: 'run: build example'

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Target branch. Defaults to the branch that triggered this workflow.'
        type: string
        required: false
        default: ''
      run_cocos_prepare:
        description: 'Run prepare-example before packaging.'
        type: boolean
        required: false
        default: true
      build_platform_packages:
        description: 'Build Android APK and iOS simulator app. Requires Cocos Creator on the runner.'
        type: boolean
        required: false
        default: false
      runner_label:
        description: 'Runner label. Use a macOS self-hosted runner with Cocos Creator when build_platform_packages is true.'
        type: string
        required: false
        default: 'macos-latest'
  workflow_call:
    inputs:
      target_branch:
        type: string
        required: false
        default: ''
      run_cocos_prepare:
        type: boolean
        required: false
        default: true
      build_platform_packages:
        type: boolean
        required: false
        default: false
      runner_label:
        type: string
        required: false
        default: 'macos-latest'
    secrets:
      APP_ID:
        required: true
      AGORA_CHANNEL_ID:
        required: false
      AGORA_TOKEN:
        required: false

jobs:
  build_example:
    runs-on: ${{ inputs.runner_label || 'macos-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch || github.ref_name }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare example
        if: ${{ inputs.run_cocos_prepare }}
        run: ./scripts/prepare-example.sh

      - name: Verify
        run: npm run verify

      - name: Package customer delivery
        run: ./scripts/package-customer-delivery.sh ./dist/customer-delivery

      - name: Configure Agora example credentials
        if: ${{ inputs.build_platform_packages }}
        env:
          DEFAULT_BUILD_APP_ID: ${{ secrets.APP_ID }}
          AGORA_CHANNEL_ID: ${{ secrets.AGORA_CHANNEL_ID }}
          AGORA_TOKEN: ${{ secrets.AGORA_TOKEN }}
        run: |
          if [ -z "$DEFAULT_BUILD_APP_ID" ]; then
            echo "APP_ID secret is required when build_platform_packages is true." >&2
            exit 1
          fi
          export AGORA_CHANNEL_ID="${AGORA_CHANNEL_ID:-testapi}"
          node --input-type=module - <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';

          const configPath = 'example/basic-call/assets/resources/agora-config.json';
          const config = JSON.parse(await readFile(configPath, 'utf8'));
          config.appId = process.env.DEFAULT_BUILD_APP_ID;
          config.channelId = process.env.AGORA_CHANNEL_ID;
          config.token = process.env.AGORA_TOKEN ?? '';
          await writeFile(configPath, `${JSON.stringify(config, null, 2)}\n`, 'utf8');
          NODE

      - name: Build Android and iOS example packages
        if: ${{ inputs.build_platform_packages }}
        run: npm run build:all-platforms

      - name: Upload SDK package
        uses: actions/upload-artifact@v4
        with:
          name: agora-rtc-cocos-plugin
          path: dist/agora-rtc-cocos-plugin.zip
          if-no-files-found: error

      - name: Upload customer delivery
        uses: actions/upload-artifact@v4
        with:
          name: agora-cocos-customer-delivery
          path: dist/customer-delivery
          if-no-files-found: error

      - name: Upload Android example APK
        if: ${{ inputs.build_platform_packages }}
        uses: actions/upload-artifact@v4
        with:
          name: agora-cocos-example-android-apk
          path: example/basic-call/build-android/android/proj/build/agora-cocos-basic-call/outputs/apk/debug/agora-cocos-basic-call-debug.apk
          if-no-files-found: error

      - name: Upload iOS simulator example app
        if: ${{ inputs.build_platform_packages }}
        uses: actions/upload-artifact@v4
        with:
          name: agora-cocos-example-ios-simulator-app
          path: example/basic-call/build-ios/agora-cocos-basic-call-mobile-Debug-iphonesimulator.app.zip
          if-no-files-found: error
