name: 'run: build example'

env:
  COCOS_CREATOR_VERSION: 3.8.8
  COCOS_CREATOR_DOWNLOAD_URL: https://download.cocos.org/CocosCreator/v3.8.8/CocosCreator-v3.8.8-mac-010512.zip

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Target branch. Defaults to the branch that triggered this workflow.'
        type: string
        required: false
        default: ''
      run_cocos_prepare:
        description: 'Run prepare-example before packaging.'
        type: boolean
        required: false
        default: true
      target_platforms:
        description: 'Example package platforms: android, ios, or android,ios.'
        type: string
        required: false
        default: 'android,ios'
      runner_label:
        description: 'Runner label(s) for example packages. Use macos-latest or comma-separated self-hosted labels.'
        type: string
        required: false
        default: 'macos-latest'
  workflow_call:
    inputs:
      target_branch:
        type: string
        required: false
        default: ''
      run_cocos_prepare:
        type: boolean
        required: false
        default: true
      target_platforms:
        type: string
        required: false
        default: ''
      runner_label:
        type: string
        required: false
        default: 'macos-latest'
    secrets:
      APP_ID:
        required: false
      BUILD_PROVISION_PROFILE_UUID:
        required: false
      BUILD_PROVISION_PROFILE_NAME:
        required: false
      BUILD_PROVISION_PROFILE_TEAMID:
        required: false
      BUILD_PROVISION_PROFILE_IDENTITY:
        required: false
      BUILD_CERTIFICATE_BASE64:
        required: false
      P12_PASSWORD:
        required: false
      BUILD_PROVISION_PROFILE_BASE64:
        required: false
      KEYCHAIN_PASSWORD:
        required: false

jobs:
  package_sdk:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch || github.ref_name }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare example
        if: ${{ inputs.run_cocos_prepare }}
        run: ./scripts/prepare-example.sh

      - name: Verify
        run: npm run verify

      - name: Package customer delivery
        run: ./scripts/package-customer-delivery.sh ./dist/customer-delivery

      - name: Upload SDK package
        uses: actions/upload-artifact@v4
        with:
          name: agora-rtc-cocos-plugin
          path: dist/agora-rtc-cocos-plugin.zip
          if-no-files-found: error

      - name: Upload customer delivery
        uses: actions/upload-artifact@v4
        with:
          name: agora-cocos-customer-delivery
          path: dist/customer-delivery
          if-no-files-found: error

  split-platforms:
    runs-on: ubuntu-latest
    outputs:
      platforms: ${{ steps.split-platforms.outputs.platforms }}
    steps:
      - id: split-platforms
        env:
          target_platforms: ${{ inputs.target_platforms }}
        run: |
          platforms=$(echo "$target_platforms" | sed 's/ //g' | tr ',' '\n' | sort -u | sed '/^$/d' | jq -R -s -c 'split("\n")[:-1]')
          unsupported=$(echo "$platforms" | jq -r 'map(select(. != "android" and . != "ios")) | join(",")')
          if [ -n "$unsupported" ]; then
            echo "Unsupported target_platforms value: $unsupported. Supported values are android and ios." >&2
            exit 1
          fi
          echo "platforms=$platforms" >> "$GITHUB_OUTPUT"

  split-runner-labels:
    runs-on: ubuntu-latest
    outputs:
      runner_labels: ${{ steps.split-runner-labels.outputs.runner_labels }}
    steps:
      - id: split-runner-labels
        env:
          target_platforms: ${{ inputs.target_platforms }}
          runner_label: ${{ inputs.runner_label }}
        run: |
          labels=$(echo "$runner_label" | sed 's/ //g' | tr ',' '\n' | sed '/^$/d' | jq -R -s -c 'split("\n")[:-1]')
          normalized_target_platforms=$(echo "$target_platforms" | sed 's/[ ,]//g')
          if [ "$labels" = "[]" ] && [ -n "$normalized_target_platforms" ]; then
            echo "runner_label is required when target_platforms is not empty." >&2
            exit 1
          fi
          if [ "$labels" = "[]" ]; then
            labels='["macos-latest"]'
          fi
          echo "runner_labels=$labels" >> "$GITHUB_OUTPUT"

  build_platform_package:
    if: ${{ needs.split-platforms.outputs.platforms != '[]' }}
    runs-on: ${{ fromJson(needs.split-runner-labels.outputs.runner_labels) }}
    needs: [package_sdk, split-platforms, split-runner-labels]
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.split-platforms.outputs.platforms) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch || github.ref_name }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup JDK for Android
        if: ${{ matrix.platform == 'android' }}
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK for Cocos
        if: ${{ matrix.platform == 'android' }}
        shell: bash
        run: |
          set -euo pipefail

          android_sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/Library/Android/sdk}}"
          sdkmanager="$android_sdk_root/cmdline-tools/latest/bin/sdkmanager"

          if [ ! -x "$sdkmanager" ]; then
            echo "Android sdkmanager not found at $sdkmanager." >&2
            exit 1
          fi

          yes | "$sdkmanager" --licenses >/dev/null
          "$sdkmanager" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "cmake;3.22.1" \
            "ndk;23.1.7779620"

          echo "ANDROID_SDK_ROOT=$android_sdk_root" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$android_sdk_root" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$android_sdk_root/ndk/23.1.7779620" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$android_sdk_root/ndk/23.1.7779620" >> "$GITHUB_ENV"

      - name: Cache Cocos Creator installer
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/cocos-creator/CocosCreator-v${{ env.COCOS_CREATOR_VERSION }}-mac-010512.zip
          key: cocos-creator-${{ runner.os }}-${{ env.COCOS_CREATOR_VERSION }}-010512

      - name: Install Cocos Creator
        shell: bash
        run: |
          set -euo pipefail

          app_path="/Applications/Cocos/Creator/${COCOS_CREATOR_VERSION}/CocosCreator.app"
          cli_path="$app_path/Contents/MacOS/CocosCreator"
          install_dir="$(dirname "$app_path")"
          installer_path="$HOME/Library/Caches/cocos-creator/CocosCreator-v${COCOS_CREATOR_VERSION}-mac-010512.zip"

          if [ ! -x "$cli_path" ]; then
            mkdir -p "$(dirname "$installer_path")"
            if [ ! -f "$installer_path" ]; then
              curl --fail --location --retry 3 --retry-delay 10 "$COCOS_CREATOR_DOWNLOAD_URL" --output "$installer_path"
            fi

            extract_dir="$RUNNER_TEMP/cocos-creator-${COCOS_CREATOR_VERSION}"
            rm -rf "$extract_dir"
            mkdir -p "$extract_dir"
            ditto -x -k "$installer_path" "$extract_dir"

            creator_app="$(find "$extract_dir" -name CocosCreator.app -type d -print -quit)"
            if [ -z "$creator_app" ]; then
              echo "CocosCreator.app not found in downloaded archive." >&2
              exit 1
            fi

            sudo mkdir -p "$install_dir"
            sudo rm -rf "$app_path"
            sudo ditto "$creator_app" "$app_path"
            sudo xattr -dr com.apple.quarantine "$app_path" || true
          fi

          if [ ! -x "$cli_path" ]; then
            echo "Cocos Creator executable was not installed at $cli_path" >&2
            exit 1
          fi

          echo "COCOS_CLI=$cli_path" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Configure Agora example credentials
        env:
          APP_ID: ${{ secrets.APP_ID }}
          CHANNEL_ID: testapi
          TOKEN: ''
        run: |
          if [ -z "$APP_ID" ]; then
            echo "APP_ID secret is required when target_platforms is not empty." >&2
            exit 1
          fi
          node ./scripts/write-example-build-config.mjs

      - name: Setup signing key for iOS
        if: ${{ matrix.platform == 'ios' }}
        env:
          BUILD_PROVISION_PROFILE_UUID: ${{ secrets.BUILD_PROVISION_PROFILE_UUID }}
          BUILD_PROVISION_PROFILE_NAME: ${{ secrets.BUILD_PROVISION_PROFILE_NAME }}
          BUILD_PROVISION_PROFILE_TEAMID: ${{ secrets.BUILD_PROVISION_PROFILE_TEAMID }}
          BUILD_PROVISION_PROFILE_IDENTITY: ${{ secrets.BUILD_PROVISION_PROFILE_IDENTITY }}
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          required=(
            BUILD_PROVISION_PROFILE_UUID
            BUILD_PROVISION_PROFILE_NAME
            BUILD_PROVISION_PROFILE_TEAMID
            BUILD_PROVISION_PROFILE_IDENTITY
            BUILD_CERTIFICATE_BASE64
            P12_PASSWORD
            BUILD_PROVISION_PROFILE_BASE64
            KEYCHAIN_PASSWORD
          )
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "$name secret is required when target_platforms includes ios." >&2
              exit 1
            fi
          done

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/${BUILD_PROVISION_PROFILE_UUID}.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          ruby -rbase64 -e 'File.binwrite(ARGV[1], Base64.decode64(ENV.fetch(ARGV[0])))' BUILD_CERTIFICATE_BASE64 "$CERTIFICATE_PATH"
          ruby -rbase64 -e 'File.binwrite(ARGV[1], Base64.decode64(ENV.fetch(ARGV[0])))' BUILD_PROVISION_PROFILE_BASE64 "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build selected example package
        env:
          BUILD_PROVISION_PROFILE_NAME: ${{ secrets.BUILD_PROVISION_PROFILE_NAME }}
          BUILD_PROVISION_PROFILE_TEAMID: ${{ secrets.BUILD_PROVISION_PROFILE_TEAMID }}
          BUILD_PROVISION_PROFILE_IDENTITY: ${{ secrets.BUILD_PROVISION_PROFILE_IDENTITY }}
          IOS_EXPORT_METHOD: development
        run: npm run build:all-platforms -- "${{ matrix.platform }}"

      - name: Upload Android example APK
        if: ${{ matrix.platform == 'android' }}
        uses: actions/upload-artifact@v4
        with:
          name: agora-cocos-example-android-apk
          path: example/basic-call/build-android/android/proj/build/agora-cocos-basic-call/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload iOS example IPA
        if: ${{ matrix.platform == 'ios' }}
        uses: actions/upload-artifact@v4
        with:
          name: agora-cocos-example-ios-ipa
          path: example/basic-call/build-ios/ipa/agora-cocos-basic-call-mobile.ipa
          if-no-files-found: error
